<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>The FS Hockey League</title>
    <link href="./styles.css" rel="stylesheet"/>
</head>
<body>
<div id="root">
    <canvas id="screen" width="960" height="620" aria-label="The FS Hockey League game screen" role="img"></canvas>
    <p class="hint">
        <b>UP/DOWN</b> select team &middot; <b>TAB</b> switch column &middot;
        <b>ENTER</b> start &middot; <b>L</b> league &middot; <b>F11</b> fullscreen
    </p>
    <p class="hint">
        P1: <b>Arrows</b> + <b>RShift/Enter</b> &middot;
        P2: <b>WASD</b> + <b>Space/Tab</b> (set a team to HUMAN PLAYER)
    </p>
    <a class="github-link" href="https://github.com/" rel="noopener noreferrer" target="_blank">The FS Hockey League — F# + Fable</a>
</div>
<script src="./Program.fs.js" type="module"></script>
</body>
</html>
